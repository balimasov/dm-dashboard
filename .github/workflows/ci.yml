name: CI

# No `branches:` filter on `push` — every push, on every branch, gets a run.
# This isn't for coverage's sake: the "verify" check is required on `main`
# via a ruleset, and a direct push to a protected branch is only allowed
# once GitHub already has a passing check *for that exact commit SHA*. This
# repo never opens a PR — a commit gets its check run on
# claude/dm-character-dashboard-1ti81k first, then lands on `main` via a
# fast-forward that keeps the same SHA, carrying the already-green check
# with it. Scoping `push` to `main` only (the more typical setup) would
# mean the check never runs until *after* the push it's supposed to gate,
# which GitHub's required-status-check rule would simply reject outright.
on:
  push:
  pull_request:
    branches: [main]

# Cancels a still-running check for the same branch/PR once a newer push
# lands, instead of letting stale and fresh runs finish side by side.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # `RouteContext<'...'>` (used in every dynamic API route handler) is a
      # Next.js-generated global type, not something this repo declares
      # itself — it only exists after `next dev`, `next build`, or this
      # command runs at least once. A fresh CI checkout has none of those
      # yet, so `tsc --noEmit` below would otherwise fail with "Cannot find
      # name 'RouteContext'" on every dynamic route (confirmed: this bit the
      # very first CI run, passing locally only because a local `next dev`/
      # `next build` had already generated `.next/types` beforehand).
      - name: Generate Next.js route types
        run: npx next typegen

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
